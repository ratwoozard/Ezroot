# Kun PostgreSQL – til lokal kørsel uden Supabase. Start: docker compose up -d
services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: ezroot
    ports:
      - "5432:5432"
    volumes:
      - ezroot_pgdata:/var/lib/postgresql/data

volumes:
  ezroot_pgdata:
